<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Registrations | Faculty Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Table Styles */
        th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; font-weight: 700; }
        td { font-size: 14px; color: #334155; }
        tr:hover td { background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="glass-header fixed w-full z-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <a href="/staff/dashboard" class="text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <div>
                <h1 class="font-bold text-lg leading-none" id="header-title">Loading Event...</h1>
                <p class="text-xs text-blue-600 font-semibold mt-1">REGISTRATION MANAGER</p>
            </div>
        </div>
<div class="flex gap-2">
    <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-lg">
        <i class="fas fa-file-excel"></i> Export CSV
    </button>

    <button onclick="downloadPDF()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-lg">
        <i class="fas fa-file-pdf text-red-400"></i> Export PDF
    </button>
</div>
    </nav>

    <div class="pt-24 pb-12 max-w-7xl mx-auto px-6">

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            
<div class="relative w-full md:w-80">
    <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>
    <input type="text" id="searchInput" placeholder="Search Name..." 
           class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-100 text-sm">
</div>

<div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
    
    <div class="relative min-w-[130px]">
        <select id="typeFilter" class="w-full appearance-none bg-gray-50 border border-blue-200 text-blue-800 font-medium text-sm rounded-lg px-3 py-2.5 pr-8 focus:outline-none cursor-pointer">
            <option value="">All Types</option>
            <option value="alumni">Alumni</option>
            <option value="team">Teams</option>
            <option value="individual">Individual</option>
        </select>
        <i class="fas fa-chevron-down absolute right-3 top-3.5 text-xs text-blue-400 pointer-events-none"></i>
    </div>

    <div class="relative min-w-[120px]">
        <select id="deptFilter" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg px-3 py-2.5 pr-8 focus:outline-none cursor-pointer">
            <option value="">All Depts</option>
                            
                            <option value="CSE">Computer Science Engineering</option>
                            <option value="ECE">Electronics & Communication</option>
                            <option value="AIDS">Artificial Intelligence & Data Science</option>
                            <option value="MCT">Mechatronics</option>
                            <option value="CIVIL">Civil Engineering</option>
                            <option value="MECH">Mechanical Engineering</option>
                            <option value="IT">Information Technology</option>
                            <option value="CYBER SECURITY">Cyber Security</option>
                            <option value="VLSI">VLSI Design</option>
                            <option value="EEE">Electrical & Electronics Engineering</option>
                            <option value="AIML">AI & Machine Learning</option>
                            <option value="S&H">Science & Humanities</option>
                            <option value="MBA">MBA</option>
                            <option value="Placement">Placement Cell</option>
        </select>
        <i class="fas fa-chevron-down absolute right-3 top-3.5 text-xs text-gray-400 pointer-events-none"></i>
    </div>

    <div class="relative min-w-[110px]">
        <select id="yearFilter" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg px-3 py-2.5 pr-8 focus:outline-none cursor-pointer">
            <option value="">All Years</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
        </select>
        <i class="fas fa-filter absolute right-3 top-3.5 text-xs text-gray-400 pointer-events-none"></i>
    </div>
</div>

            <div class="hidden md:block bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-sm font-bold">
                <span id="total-count">0</span> Students
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4">#</th>
                            <th class="px-6 py-4">Student Name</th>
                            <th class="px-6 py-4">Reg Number</th>
                            <th class="px-6 py-4">Details</th>
                            <th class="px-6 py-4">Contact</th>
                            <th class="px-6 py-4">Team</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="hidden flex-col items-center justify-center py-12 text-center">
                <div class="bg-gray-50 rounded-full h-16 w-16 flex items-center justify-center mb-3">
                    <i class="fas fa-user-slash text-gray-400 text-2xl"></i>
                </div>
                <h3 class="text-gray-900 font-medium">No students found</h3>
                <p class="text-gray-500 text-sm">Try adjusting your search or filters.</p>
            </div>
        </div>

    </div>
    <footer class="absolute bottom-4 w-full text-center z-10 px-4">
        <div class="flex flex-col md:flex-row justify-center items-center gap-1 md:gap-4 text-xs font-medium text-slate-400 dark:text-slate-500">
            <span>&copy; 2026 CIET. All rights reserved.</span>
            <span class="hidden md:inline text-slate-300 dark:text-slate-600">|</span>
            <span>
                Developed by 
                <a href="https://deva-portfolio-app.netlify.app/" target="_blank" class="text-slate-600 dark:text-slate-300 font-bold hover:text-brand-600 dark:hover:text-brand-400 hover:underline transition-all">
                    Deva Veera Kumaran
                </a>
            </span>
        </div>
    </footer>

<script>
    const EVENT_ID = "{{ event_id }}";
    // Get the base website URL (e.g., http://localhost:5000) for the excel links
    const BASE_URL = window.location.origin; 
    let allStudents = [];

    // --- 1. Fetch Data ---
    async function loadRegistrations() {
        try {
            const res = await fetch(`/api/staff/registrations/${EVENT_ID}`);
            if (res.status === 403) return alert("Unauthorized");

            const data = await res.json();
            document.getElementById('header-title').textContent = data.event_title || "Event Details";

            allStudents = [];
            (data.registrations || []).forEach(reg => {
                reg.participants.forEach(p => {
                    allStudents.push({
                        name: p.name,
                        identifier: reg.type === 'alumni' ? `Batch: ${p.reg_no}` : p.reg_no, 
                        details: reg.type === 'alumni' ? `${p.designation} @ ${p.company}` : `${p.dept} - Year ${p.year}`,
                        
                        // Data for Filtering
                        dept: p.dept || '', 
                        year: p.year || '',
                        raw_type: reg.type === 'team' ? 'team' : (reg.type === 'alumni' ? 'alumni' : 'individual'),
                        
                        // Contact
                        phone: p.phone,
                        email: p.email || '-',
                        team_display: reg.type === 'team' ? reg.team_name : (reg.type === 'alumni' ? 'Alumni' : 'Individual'),
                        
                        // PHOTO HANDLING
                        photo_filename: p.photo || null
                    });
                });
            });

            renderTable(allStudents);
        } catch (err) { console.error(err); }
    }

    // --- 2. Render Table ---
    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        document.getElementById('total-count').textContent = data.length;
        tbody.innerHTML = '';

        if(data.length === 0) {
             document.getElementById('empty-state').classList.remove('hidden');
             document.getElementById('empty-state').classList.add('flex');
             return;
        }
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('flex');

        data.forEach((s, i) => {
            // 1. Badge Color Logic
            let badgeClass = "bg-gray-100 text-gray-800"; // Default
            if(s.raw_type === 'team') badgeClass = "bg-blue-50 text-blue-700 border-blue-100";
            if(s.raw_type === 'alumni') badgeClass = "bg-purple-50 text-purple-700 border-purple-100";

            // 2. Photo Icon Logic (Visual indicator only)
            let photoIcon = '';
            if(s.photo_filename) {
                photoIcon = `<a href="/static/uploads/${s.photo_filename}" target="_blank" class="ml-2 text-blue-500 hover:text-blue-700" title="View Photo"><i class="fas fa-image"></i></a>`;
            }

            const row = `
                <tr class="hover:bg-slate-50 transition border-b border-gray-100 group">
                    <td class="px-6 py-4 text-gray-400 font-mono text-xs">${i + 1}</td>
                    <td class="px-6 py-4 font-medium text-slate-800">
                        ${s.name}
                        ${photoIcon}
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-500 font-mono">${s.identifier}</td>
                    <td class="px-6 py-4 text-sm text-slate-600">${s.details}</td>
                    <td class="px-6 py-4 text-sm text-slate-500"><i class="fas fa-phone text-xs mr-2 text-gray-300"></i>${s.phone}</td>
                    <td class="px-6 py-4">
                        <span class="text-xs font-bold px-2 py-1 rounded border ${badgeClass}">
                            ${s.team_display}
                        </span>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // --- 3. Filter Logic (Now includes TYPE) ---
    function filterData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const dept = document.getElementById('deptFilter').value;
        const year = document.getElementById('yearFilter').value;
        const type = document.getElementById('typeFilter').value; // <--- NEW

        const filtered = allStudents.filter(s => {
            const matchesSearch = s.name.toLowerCase().includes(query) || s.identifier.toLowerCase().includes(query);
            const matchesDept = dept === "" || s.dept === dept;
            const matchesYear = year === "" || (s.year && s.year.toString() === year);
            const matchesType = type === "" || s.raw_type === type; // <--- NEW

            return matchesSearch && matchesDept && matchesYear && matchesType;
        });

        renderTable(filtered);
    }

    // Event Listeners
    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('deptFilter').addEventListener('change', filterData);
    document.getElementById('yearFilter').addEventListener('change', filterData);
    document.getElementById('typeFilter').addEventListener('change', filterData); // <--- NEW


    // --- 4. EXCEL EXPORT (With Photo Links) ---
    function exportToExcel() {
        // We export the *currently filtered* data, not everything
        // This is better because if you filter by "Alumni", you only export Alumni.
        
        // Use the same filter logic to get current list
        const query = document.getElementById('searchInput').value.toLowerCase();
        const dept = document.getElementById('deptFilter').value;
        const year = document.getElementById('yearFilter').value;
        const type = document.getElementById('typeFilter').value;

        const dataToExport = allStudents.filter(s => {
            const matchesSearch = s.name.toLowerCase().includes(query) || s.identifier.toLowerCase().includes(query);
            const matchesDept = dept === "" || s.dept === dept;
            const matchesYear = year === "" || (s.year && s.year.toString() === year);
            const matchesType = type === "" || s.raw_type === type;
            return matchesSearch && matchesDept && matchesYear && matchesType;
        });

        if(dataToExport.length === 0) return alert("No data to export!");

        // CSV Header
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Name,RegNo/Batch,Details,Phone,Email,Type,Photo Link\n"; // Added Photo Link

        dataToExport.forEach(row => {
            const name = `"${row.name}"`;
            const id = `"${row.identifier}"`; 
            const det = `"${row.details}"`; 
            const type = `"${row.team_display}"`;
            
            // Generate Photo Link
            let photoLink = "N/A";
            if(row.photo_filename) {
                photoLink = `${BASE_URL}/static/uploads/${row.photo_filename}`;
            }
            
            csvContent += `${name},${id},${det},${row.phone},${row.email},${type},${photoLink}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Registrations_Export.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // --- 5. PDF EXPORT ---
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const title = document.getElementById('header-title').textContent;
        doc.setFontSize(16);
        doc.text(title, 14, 20);
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleDateString()}`, 14, 28);

        const tableRows = [];
        document.querySelectorAll("#table-body tr").forEach(row => {
            const cols = row.querySelectorAll("td");
            if(cols.length > 1) { 
                tableRows.push([
                    cols[1].innerText.trim(), // Name
                    cols[2].innerText, // ID
                    cols[3].innerText, // Details
                    cols[4].innerText, // Phone
                    cols[5].innerText  // Team
                ]);
            }
        });

        doc.autoTable({
            startY: 35,
            head: [['Name', 'Reg No', 'Details', 'Phone', 'Type']],
            body: tableRows,
            theme: 'grid',
            headStyles: { fillColor: [30, 41, 59] },
            styles: { fontSize: 9 }
        });

        doc.save('Registration_List.pdf');
    }

    // Initial Load
    loadRegistrations();
</script>
</body>
</html>
