<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | CIET Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { 900: '#0B0F19', 800: '#111827', 700: '#1F2937' },
                        danger: { 500: '#ef4444', 600: '#dc2626' }
                    }
                }
            }
        }
    </script>

    <style>
        /* Glass Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Background Animation */
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 20px); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-dark-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-300">

    <div class="fixed inset-0 pointer-events-none">
        <div class="blob bg-red-500 w-96 h-96 top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="blob bg-blue-500 w-80 h-80 bottom-0 right-0 translate-x-1/3 translate-y-1/3 animation-delay-2000"></div>
    </div>

    <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl relative z-10 mx-4">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-xl font-bold mb-4">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="text-2xl font-bold tracking-tight">Reset Password</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Authenticate with Admin Code to reset</p>
        </div>

        <form id="resetForm" class="space-y-5">
            
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-400"></i>
                    </div>
                    <input type="text" id="username" placeholder="Enter your ID" required 
                        class="w-full pl-11 pr-4 py-3 bg-white dark:bg-dark-800 border border-slate-200 dark:border-dark-700 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 transition-all placeholder:text-slate-400">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="new_pass" placeholder="Enter new password" required 
                        class="w-full pl-11 pr-12 py-3 bg-white dark:bg-dark-800 border border-slate-200 dark:border-dark-700 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 transition-all placeholder:text-slate-400">
                    
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-danger-600 dark:text-red-400 uppercase ml-1">Admin Secret Code</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-shield-alt text-red-500"></i>
                    </div>
                    <input type="text" id="code" placeholder="Verification Code" required 
                        class="w-full pl-11 pr-4 py-3 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900/50 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all placeholder:text-slate-400">
                </div>
            </div>

            <div id="error-msg" class="hidden flex items-center gap-2 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-xs font-medium border border-red-100 dark:border-red-900/30">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Reset failed</span>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-3.5 bg-slate-900 dark:bg-white hover:bg-slate-800 dark:hover:bg-slate-200 text-white dark:text-slate-900 font-bold rounded-xl shadow-lg transition-all hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                <span>Reset Password</span>
                <i id="btn-spinner" class="fas fa-spinner fa-spin hidden"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/auth/login" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-brand-600 dark:text-slate-400 dark:hover:text-white transition-colors">
                <i class="fas fa-arrow-left text-xs"></i> Back to Login
            </a>
        </div>
    </div>

    <script>
        // --- THEME ---
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // --- PASSWORD TOGGLE ---
        const toggleBtn = document.getElementById('togglePassword');
        const passInput = document.getElementById('new_pass');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleBtn.querySelector('i').classList.toggle('fa-eye');
            toggleBtn.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // --- SUBMIT LOGIC ---
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('btn-spinner');
            const btnText = submitBtn.querySelector('span');
            const errorBox = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            // 1. Loading UI
            submitBtn.disabled = true;
            btnText.textContent = "Processing...";
            spinner.classList.remove('hidden');
            errorBox.classList.add('hidden');

            try {
                // 2. API Call
                const res = await fetch('/api/auth/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        new_password: document.getElementById('new_pass').value,
                        admin_code: document.getElementById('code').value
                    })
                });
                
                const data = await res.json();

                // 3. Success
                if(res.ok) { 
                    btnText.textContent = "Password Updated!";
                    submitBtn.classList.remove('bg-slate-900', 'dark:bg-white');
                    submitBtn.classList.add('bg-green-600', 'text-white');
                    spinner.classList.add('hidden');
                    
                    setTimeout(() => {
                        window.location.href = '/auth/login'; 
                    }, 1000);
                } 
                // 4. Error
                else { 
                    throw new Error(data.error || "Failed to reset password");
                }
            } catch (err) {
                submitBtn.disabled = false;
                btnText.textContent = "Reset Password";
                spinner.classList.add('hidden');
                
                errorText.textContent = err.message;
                errorBox.classList.remove('hidden');

                // Shake animation
                const card = document.querySelector('.glass-panel');
                card.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }
    </script>
</body>
</html>
